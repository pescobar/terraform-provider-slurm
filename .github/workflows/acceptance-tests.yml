name: Acceptance Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  acceptance:
    name: Acceptance Tests (Slurm ${{ matrix.slurm_version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - slurm_version: "25.05.4"
            api_version: "v0.0.42"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Install the OpenTofu binary and configure terraform-plugin-testing to
      # use it. provider_acceptance_tests: true automatically exports:
      #   TF_ACC=1
      #   TF_ACC_PROVIDER_HOST=registry.opentofu.org
      #   TF_ACC_TERRAFORM_PATH=<path to tofu binary>
      - uses: opentofu/setup-opentofu@v1
        with:
          provider_acceptance_tests: true

      # -----------------------------------------------------------------------
      # Start the Slurm cluster from pre-built GHCR images (public, no auth needed)
      # -----------------------------------------------------------------------
      - name: Start Slurm cluster
        working-directory: docker/
        env:
          SLURM_VERSION: ${{ matrix.slurm_version }}
        run: docker compose up -d

      - name: Wait for slurmctld to be ready
        run: |
          echo "Waiting for slurmctld..."
          for i in $(seq 1 36); do
            if docker exec slurmctld scontrol ping &>/dev/null 2>&1; then
              echo "slurmctld ready."
              break
            fi
            echo "  attempt $i/36 — sleeping 5s"
            sleep 5
          done
          docker exec slurmctld scontrol ping

      - name: Wait for slurmrestd to be ready
        run: |
          TOKEN=$(docker exec slurmctld scontrol token lifespan=600 \
                  | sed 's/SLURM_JWT=//')
          echo "Waiting for slurmrestd on port 6820..."
          for i in $(seq 1 24); do
            if curl -sf -H "X-SLURM-USER-TOKEN: $TOKEN" \
                http://localhost:6820/slurmdb/${{ matrix.api_version }}/diag/ &>/dev/null; then
              echo "slurmrestd ready."
              break
            fi
            echo "  attempt $i/24 — sleeping 5s"
            sleep 5
          done

      - name: Generate JWT token
        run: |
          TOKEN=$(docker exec slurmctld scontrol token lifespan=3600 \
                  | sed 's/SLURM_JWT=//')
          echo "SLURM_JWT_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      # Run acceptance tests against the OpenTofu binary
      # -----------------------------------------------------------------------
      - name: Run acceptance tests
        env:
          SLURM_REST_URL: "http://localhost:6820"
          SLURM_CLUSTER: "linux"
          SLURM_API_VERSION: ${{ matrix.api_version }}
        run: go test ./... -v -count=1 -timeout 30m -run TestAcc

      - name: Collect Docker logs on failure
        if: failure()
        run: |
          for svc in mysql slurmdbd slurmctld slurmrestd; do
            echo "=== $svc ==="
            docker logs "$svc" 2>&1 | tail -50 || true
          done
