name: Acceptance Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  acceptance:
    name: Acceptance Tests (Slurm ${{ matrix.slurm_version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - slurm_version: "25.05.4"
            api_version: "v0.0.42"
          - slurm_version: "25.11.5"
            api_version: "v0.0.44"
          - slurm_version: "26.05.1"
            api_version: "v0.0.45"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: opentofu/setup-opentofu@v2

      # -----------------------------------------------------------------------
      # Start the Slurm cluster from pre-built GHCR images (public, no auth needed)
      # -----------------------------------------------------------------------
      - name: Start Slurm cluster
        working-directory: docker/
        env:
          SLURM_VERSION: ${{ matrix.slurm_version }}
        run: docker compose up -d

      - name: Wait for slurmctld to be ready
        run: |
          echo "Waiting for slurmctld..."
          for i in $(seq 1 36); do
            if docker exec slurmctld scontrol ping &>/dev/null 2>&1; then
              echo "slurmctld ready."
              break
            fi
            echo "  attempt $i/36 — sleeping 5s"
            sleep 5
          done
          docker exec slurmctld scontrol ping

      - name: Wait for slurmrestd to be ready
        run: |
          TOKEN=$(docker exec slurmctld scontrol token lifespan=600 \
                  | sed 's/SLURM_JWT=//')
          echo "Waiting for slurmrestd on port 6820..."
          for i in $(seq 1 24); do
            if curl -sf -H "X-SLURM-USER-TOKEN: $TOKEN" \
                http://localhost:6820/slurmdb/${{ matrix.api_version }}/diag/ &>/dev/null; then
              echo "slurmrestd ready."
              break
            fi
            echo "  attempt $i/24 — sleeping 5s"
            sleep 5
          done

      - name: Print Slurm version
        run: |
          docker exec slurmctld slurmctld -V
          docker exec slurmrestd slurmrestd -V

      - name: Print available REST API versions
        run: |
          TOKEN=$(docker exec slurmctld scontrol token lifespan=600 | sed 's/SLURM_JWT=//')
          curl -s -H "X-SLURM-USER-TOKEN: $TOKEN" http://localhost:6820/openapi/v3 \
            | jq '.paths | keys | map(select(startswith("/slurm") or startswith("/slurmdb"))) | map(split("/")[2]) | unique'

      - name: Generate JWT token
        run: |
          TOKEN=$(docker exec slurmctld scontrol token lifespan=3600 \
                  | sed 's/SLURM_JWT=//')
          echo "SLURM_JWT_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      # Build the provider and run acceptance tests via tofu apply/destroy
      # -----------------------------------------------------------------------
      - name: Build provider binary
        run: go build -o /tmp/terraform-provider-slurm .

      - name: Configure dev_overrides
        run: |
          cat > /tmp/dev.tofurc <<EOF
          provider_installation {
            dev_overrides {
              "pescobar/slurm" = "/tmp"
            }
            direct {}
          }
          EOF

      - name: Validate registry doc snippets
        env:
          TF_CLI_CONFIG_FILE: /tmp/dev.tofurc
          TF_VAR_slurm_token: ${{ env.SLURM_JWT_TOKEN }}
        run: |
          # Each registry-doc fragment under examples/{provider,resources,data-sources}/
          # references resources defined in sibling fragments (e.g.
          # slurm_account.physics → slurm_qos.standard) because the rendered
          # docs assume the reader is following the full set, not one page in
          # isolation. Validating fragments individually would emit spurious
          # "Reference to undeclared resource" errors. So merge every fragment
          # into one temp dir, add the required_providers block (no fragment
          # carries one), and run a single `tofu validate`. That still catches
          # the regressions we care about — renamed attributes, removed
          # fields, wrong types — across the union of all snippets.
          set -e
          tmpdir=$(mktemp -d)
          for dir in examples/provider \
                     examples/resources/slurm_qos \
                     examples/resources/slurm_account \
                     examples/resources/slurm_user \
                     examples/data-sources/slurm_qos \
                     examples/data-sources/slurm_account \
                     examples/data-sources/slurm_user \
                     examples/data-sources/slurm_partition \
                     examples/data-sources/slurm_conf \
                     examples/data-sources/slurm_dbd_conf; do
            label=$(echo "$dir" | tr / _)
            for f in "$dir"/*.tf; do
              cp "$f" "$tmpdir/${label}_$(basename "$f")"
            done
          done
          cat > "$tmpdir/_required_providers.tf" <<'EOF'
          terraform {
            required_providers {
              slurm = { source = "pescobar/slurm" }
            }
          }
          EOF
          ls "$tmpdir"
          (cd "$tmpdir" && tofu validate)
          rm -rf "$tmpdir"
          echo "PASS: every registry doc snippet validates against the live schema"

      - name: Run basic acceptance tests
        env:
          TF_CLI_CONFIG_FILE: /tmp/dev.tofurc
          TF_VAR_slurm_token: ${{ env.SLURM_JWT_TOKEN }}
          TF_VAR_slurm_api_version: ${{ matrix.api_version }}
        run: |
          cd examples/

          # --- Cycle 1: create, verify idempotency, destroy ---
          tofu apply -auto-approve
          # -detailed-exitcode: exits 0 = no changes, 1 = error, 2 = changes detected.
          # Any non-zero exit fails the step and surfaces idempotency bugs.
          tofu plan -detailed-exitcode
          tofu destroy -auto-approve

          # --- Cycle 2: create, then verify import ---
          tofu apply -auto-approve
          tofu plan -detailed-exitcode

          tofu state rm slurm_qos.standard
          tofu state rm slurm_qos.priority
          tofu state rm slurm_account.physics
          tofu state rm slurm_user.bob

          tofu import slurm_qos.standard    standard
          tofu import slurm_qos.priority    priority
          tofu import slurm_account.physics physics
          tofu import slurm_user.bob        bob

          tofu apply -auto-approve
          tofu plan -detailed-exitcode
          tofu destroy -auto-approve

      - name: Run advanced acceptance tests
        env:
          TF_CLI_CONFIG_FILE: /tmp/dev.tofurc
          TF_VAR_slurm_token: ${{ env.SLURM_JWT_TOKEN }}
          TF_VAR_slurm_api_version: ${{ matrix.api_version }}
        run: |
          cd test/fixtures/advanced-acceptance-tests/

          # --- Cycle 1: create, verify idempotency, destroy ---
          tofu apply -auto-approve
          tofu plan -detailed-exitcode
          tofu destroy -auto-approve

          # --- Cycle 2: create, then verify import ---
          tofu apply -auto-approve
          tofu plan -detailed-exitcode

          tofu state rm slurm_qos.basic
          tofu state rm slurm_qos.standard
          tofu state rm slurm_qos.priority
          tofu state rm slurm_qos.express
          tofu state rm slurm_qos.debug
          tofu state rm slurm_account.minimal
          tofu state rm slurm_account.physics
          tofu state rm slurm_account.chemistry
          tofu state rm slurm_account.physics_hep
          tofu state rm slurm_account.physics_astro
          tofu state rm slurm_user.alice
          tofu state rm slurm_user.bob
          tofu state rm slurm_user.carol
          tofu state rm slurm_user.dave

          tofu import slurm_qos.basic           basic
          tofu import slurm_qos.standard        standard
          tofu import slurm_qos.priority        priority
          tofu import slurm_qos.express         express
          tofu import slurm_qos.debug           debug
          tofu import slurm_account.minimal     minimal
          tofu import slurm_account.physics     physics
          tofu import slurm_account.chemistry   chemistry
          tofu import slurm_account.physics_hep physics_hep
          tofu import slurm_account.physics_astro physics_astro
          tofu import slurm_user.alice          alice
          tofu import slurm_user.bob            bob
          tofu import slurm_user.carol          carol
          tofu import slurm_user.dave           dave

          tofu apply -auto-approve
          tofu plan -detailed-exitcode
          tofu destroy -auto-approve

      - name: Run user-association acceptance tests
        env:
          TF_CLI_CONFIG_FILE: /tmp/dev.tofurc
          TF_VAR_slurm_token: ${{ env.SLURM_JWT_TOKEN }}
          TF_VAR_slurm_api_version: ${{ matrix.api_version }}
        run: |
          cd test/fixtures/user-association-tests/

          # --- Cycle 1: create, verify idempotency, destroy ---
          tofu apply -auto-approve
          tofu plan -detailed-exitcode
          tofu destroy -auto-approve

          # --- Cycle 2: create, then verify import ---
          tofu apply -auto-approve
          tofu plan -detailed-exitcode

          tofu state rm slurm_qos.low
          tofu state rm slurm_qos.medium
          tofu state rm slurm_qos.high
          tofu state rm slurm_qos.debug
          tofu state rm slurm_qos.long
          tofu state rm slurm_account.dept_a
          tofu state rm slurm_account.dept_b
          tofu state rm slurm_account.team_a1
          tofu state rm slurm_account.team_a2
          tofu state rm slurm_account.team_b1
          tofu state rm slurm_user.minimal
          tofu state rm slurm_user.fairshare_only
          tofu state rm slurm_user.default_qos_only
          tofu state rm slurm_user.max_jobs_only
          tofu state rm slurm_user.qos_only
          tofu state rm slurm_user.fairshare_maxjobs
          tofu state rm slurm_user.qos_pair
          tofu state rm slurm_user.fairshare_dqos
          tofu state rm slurm_user.maxjobs_qos
          tofu state rm slurm_user.all_fields
          tofu state rm slurm_user.operator
          tofu state rm slurm_user.explicit_none
          tofu state rm slurm_user.two_accounts
          tofu state rm slurm_user.full_and_minimal
          tofu state rm slurm_user.three_accounts
          tofu state rm slurm_user.parent_child
          tofu state rm slurm_user.full_limits_multi
          tofu state rm slurm_user.operator_multi

          tofu import slurm_qos.low           assoc_low
          tofu import slurm_qos.medium        assoc_medium
          tofu import slurm_qos.high          assoc_high
          tofu import slurm_qos.debug         assoc_debug
          tofu import slurm_qos.long          assoc_long
          tofu import slurm_account.dept_a    dept_a
          tofu import slurm_account.dept_b    dept_b
          tofu import slurm_account.team_a1   team_a1
          tofu import slurm_account.team_a2   team_a2
          tofu import slurm_account.team_b1   team_b1
          tofu import slurm_user.minimal           u_minimal
          tofu import slurm_user.fairshare_only    u_fairshare
          tofu import slurm_user.default_qos_only  u_dqos
          tofu import slurm_user.max_jobs_only     u_maxjobs
          tofu import slurm_user.qos_only          u_qos
          tofu import slurm_user.fairshare_maxjobs u_fs_mj
          tofu import slurm_user.qos_pair          u_qos_pair
          tofu import slurm_user.fairshare_dqos    u_fs_dqos
          tofu import slurm_user.maxjobs_qos       u_mj_qos
          tofu import slurm_user.all_fields        u_all
          tofu import slurm_user.operator          u_operator
          tofu import slurm_user.explicit_none     u_none
          tofu import slurm_user.two_accounts      u_two
          tofu import slurm_user.full_and_minimal  u_full_min
          tofu import slurm_user.three_accounts    u_three
          tofu import slurm_user.parent_child      u_hier
          tofu import slurm_user.full_limits_multi u_full_multi
          tofu import slurm_user.operator_multi    u_op_multi

          tofu apply -auto-approve
          tofu plan -detailed-exitcode
          tofu destroy -auto-approve

      - name: Run user-association negative tests (QOS constraint error messages)
        env:
          TF_CLI_CONFIG_FILE: /tmp/dev.tofurc
          TF_VAR_slurm_token: ${{ env.SLURM_JWT_TOKEN }}
          TF_VAR_slurm_api_version: ${{ matrix.api_version }}
        run: |
          cd test/fixtures/user-association-tests/negative/

          # The association-creation failure this test triggers happens
          # AFTER the provider's atomic user-bootstrap call already created
          # the user in Slurm, so neg_u_rule1/neg_u_rule2 exist server-side
          # even though Create() returned an error and never wrote them into
          # Terraform state. `tofu destroy` below only removes resources it
          # has in state, so these two users would otherwise leak into every
          # later step in this job (e.g. confusing generate_import.py, which
          # enumerates every user on the cluster). Clean them up directly via
          # the REST API regardless of which exit path below is taken.
          cleanup_orphaned_users() {
            for user in neg_u_rule1 neg_u_rule2; do
              curl -sf -X DELETE \
                -H "X-SLURM-USER-TOKEN: ${{ env.SLURM_JWT_TOKEN }}" \
                "http://localhost:6820/slurmdb/${{ matrix.api_version }}/user/$user" \
                >/dev/null 2>&1 || true
            done
          }

          set +e
          output=$(tofu apply -auto-approve 2>&1)
          exit_code=$?
          set -e
          echo "$output"
          if [ "$exit_code" -eq 0 ]; then
            echo "FAIL: expected tofu apply to fail but it succeeded"
            tofu destroy -auto-approve
            cleanup_orphaned_users
            exit 1
          fi
          # Both bad users must have triggered an association error.
          # We check our own error title (not Slurm's internal message) because
          # the specific QOS constraint phrase in the Slurm HTTP response varies
          # across code paths and Slurm versions. The hint-text behavior is
          # covered by unit tests (TestIsQOSAccessError / TestAssocErrorDetail_*).
          for user in neg_u_rule1 neg_u_rule2; do
            if ! echo "$output" | grep -qF "associations failed"; then
              echo "FAIL: expected 'associations failed' error for $user not found"
              tofu destroy -auto-approve
              cleanup_orphaned_users
              exit 1
            fi
          done
          echo "PASS: both QOS constraint violations were correctly rejected"
          tofu destroy -auto-approve
          cleanup_orphaned_users

      - name: Run schema validator tests (plan-time, no API calls)
        env:
          TF_CLI_CONFIG_FILE: /tmp/dev.tofurc
          TF_VAR_slurm_token: ${{ env.SLURM_JWT_TOKEN }}
          TF_VAR_slurm_api_version: ${{ matrix.api_version }}
        run: |
          cd test/fixtures/validator-tests/
          # Every resource block in this fixture deliberately violates one
          # plan-time validator. `tofu plan` must exit non-zero and emit one
          # diagnostic per violation. No API calls happen, so there is nothing
          # to destroy on success or failure.
          set +e
          output=$(tofu plan 2>&1)
          exit_code=$?
          set -e
          echo "$output"
          if [ "$exit_code" -eq 0 ]; then
            echo "FAIL: expected tofu plan to fail but it succeeded — a validator regressed"
            exit 1
          fi
          # Count distinct error diagnostics. Each plan-time error renders
          # with one "Error:" title line; an unanchored match handles both
          # schema validator messages and the slurm_user ValidateConfig
          # cross-field messages, and stays robust against tofu's ANSI
          # color codes appearing between the box-drawing prefix and the
          # word "Error:".
          diag_count=$(echo "$output" | grep -c "Error:")
          if [ "$diag_count" -lt 10 ]; then
            echo "FAIL: expected 10 plan-time error diagnostics, got $diag_count"
            exit 1
          fi
          # Spot-check a representative diagnostic from each validator class
          # so a regression that silently swaps one error for another is
          # caught instead of being absorbed by the count.
          for needle in "fairshare" "max_jobs" "admin_level" "flags" "preempt_mode" "priority" "count" \
                        "At least one association block is required" \
                        "default_account must match one of the association"; do
            if ! echo "$output" | grep -qF "$needle"; then
              echo "FAIL: expected a diagnostic mentioning '$needle' but found none"
              exit 1
            fi
          done
          echo "PASS: all 10 plan-time validator violations were correctly rejected"

      - name: Run data-source acceptance tests (round-trip via data sources)
        env:
          TF_CLI_CONFIG_FILE: /tmp/dev.tofurc
          TF_VAR_slurm_token: ${{ env.SLURM_JWT_TOKEN }}
          TF_VAR_slurm_api_version: ${{ matrix.api_version }}
        run: |
          cd test/fixtures/data-source-tests/
          # Apply the resources + data sources, then assert each data
          # source returns the values its matching resource set.
          tofu apply -auto-approve

          out=$(tofu output -json)
          echo "$out"

          check() {
            local key=$1 want=$2
            got=$(echo "$out" | python3 -c "import json,sys; print(json.load(sys.stdin)['$key']['value'])")
            if [ "$got" != "$want" ]; then
              echo "FAIL: $key = $got, want $want"
              tofu destroy -auto-approve
              exit 1
            fi
          }
          check qos_priority             250
          check qos_max_wall_pj          720
          check qos_description          "QOS exercised by data-source-tests"
          check account_fairshare        4
          check account_max_jobs         50
          check user_default_account     ds_acct
          check user_admin_level         Operator
          check user_association_count   1
          check user_assoc_fairshare     7
          check user_assoc_max_jobs      12
          check user_multi_assoc_count   2
          check user_multi_alt_fairshare 3
          check partition_name           cpu
          check partition_state          UP
          # The partition "flags" field only exists in the v0.0.45+ API
          # schema (Slurm 26.05); older versions return null and the fixture
          # output collapses that to "".
          if [ "${{ matrix.api_version }}" = "v0.0.45" ]; then
            check partition_flags DEFAULT
          else
            check partition_flags ""
          fi
          echo "PASS: all 15 data-source attributes round-tripped correctly"

          # Idempotency: a second plan after the apply must show no drift.
          tofu plan -detailed-exitcode

          tofu destroy -auto-approve

      - name: Run data-source not-found tests (each data source rejects missing names)
        env:
          TF_CLI_CONFIG_FILE: /tmp/dev.tofurc
          TF_VAR_slurm_token: ${{ env.SLURM_JWT_TOKEN }}
          TF_VAR_slurm_api_version: ${{ matrix.api_version }}
        run: |
          cd test/fixtures/data-source-tests/notfound/
          set +e
          output=$(tofu plan 2>&1)
          exit_code=$?
          set -e
          echo "$output"
          if [ "$exit_code" -eq 0 ]; then
            echo "FAIL: expected plan to fail when data sources reference missing names"
            exit 1
          fi
          for needle in "QOS not found" "Account not found" "User not found"; do
            if ! echo "$output" | grep -qF "$needle"; then
              echo "FAIL: expected diagnostic '$needle' was not emitted"
              exit 1
            fi
          done
          echo "PASS: all three data sources rejected missing names with the expected diagnostic"

      - name: Run conf data-source tests (slurm_conf + slurm_dbd_conf, v0.0.45+ only)
        if: matrix.api_version == 'v0.0.45'
        env:
          TF_CLI_CONFIG_FILE: /tmp/dev.tofurc
          TF_VAR_slurm_token: ${{ env.SLURM_JWT_TOKEN }}
          TF_VAR_slurm_api_version: ${{ matrix.api_version }}
        run: |
          cd test/fixtures/conf-datasource-tests/
          tofu apply -auto-approve

          out=$(tofu output -json)
          echo "$out"

          check() {
            local key=$1 want=$2
            got=$(echo "$out" | python3 -c "import json,sys; print(json.load(sys.stdin)['$key']['value'])")
            if [ "$got" != "$want" ]; then
              echo "FAIL: $key = $got, want $want"
              exit 1
            fi
          }
          check slurm_version    "${{ matrix.slurm_version }}"
          check cluster_name     linux
          check conf_path        /etc/slurm/slurm.conf
          check scheduler_type   sched/backfill
          check conf_is_complete True
          check dbd_track_wckey  false
          check dbd_is_complete  True
          echo "PASS: conf data sources return the live slurmctld/slurmdbd configuration"

      - name: Verify conf data sources fail cleanly on older API versions
        if: matrix.api_version != 'v0.0.45'
        env:
          TF_CLI_CONFIG_FILE: /tmp/dev.tofurc
          TF_VAR_slurm_token: ${{ env.SLURM_JWT_TOKEN }}
          TF_VAR_slurm_api_version: ${{ matrix.api_version }}
        run: |
          cd test/fixtures/conf-datasource-tests/
          # On api_version < v0.0.45 the conf data sources must fail at plan
          # time with a deterministic, actionable version error — before any
          # HTTP request. This guards the error path the docs promise.
          set +e
          output=$(tofu plan -no-color 2>&1)
          exit_code=$?
          set -e
          echo "$output"
          if [ "$exit_code" -eq 0 ]; then
            echo "FAIL: expected plan to fail on api_version ${{ matrix.api_version }}"
            exit 1
          fi
          # tofu wraps diagnostics at ~78 columns, so a needle can be split
          # across lines mid-phrase. Join the wrapped lines back into one
          # string (dropping the "│" gutter) before grepping.
          flat=$(echo "$output" | sed 's/^│//' | tr '\n' ' ' | tr -s ' ')
          for needle in "requires Slurm 26.05 or later" \
                        "api_version ${{ matrix.api_version }}" \
                        'Set api_version = "v0.0.45"'; do
            if ! echo "$flat" | grep -qF "$needle"; then
              echo "FAIL: expected version-error text '$needle' was not emitted"
              exit 1
            fi
          done
          echo "PASS: conf data sources emit a clear version error on ${{ matrix.api_version }}"

      - name: Run system-QOS warning fixture (plan-time, no apply)
        env:
          TF_CLI_CONFIG_FILE: /tmp/dev.tofurc
          TF_VAR_slurm_token: ${{ env.SLURM_JWT_TOKEN }}
          TF_VAR_slurm_api_version: ${{ matrix.api_version }}
        run: |
          cd test/fixtures/system-qos-warning/
          # Plan only — applying would mutate the live "normal" system QOS,
          # which is the footgun this warning is meant to prevent.
          set +e
          output=$(tofu plan 2>&1)
          exit_code=$?
          set -e
          echo "$output"
          if [ "$exit_code" -ne 0 ]; then
            echo "FAIL: warnings should not fail plan; got exit $exit_code"
            exit 1
          fi
          if ! echo "$output" | grep -qF "Warning:"; then
            echo "FAIL: expected a Warning diagnostic, found none"
            exit 1
          fi
          if ! echo "$output" | grep -qF 'Managing built-in system QOS "normal" is fragile'; then
            echo "FAIL: expected the system-QOS warning summary, did not find it"
            exit 1
          fi
          echo "PASS: system-QOS warning fired as expected"

      - name: Run protected-root-account fixture (plan-time, no apply/destroy)
        env:
          TF_CLI_CONFIG_FILE: /tmp/dev.tofurc
          TF_VAR_slurm_token: ${{ env.SLURM_JWT_TOKEN }}
          TF_VAR_slurm_api_version: ${{ matrix.api_version }}
        run: |
          cd test/fixtures/protected-root-account/
          # 1. Import is read-only; every optional attribute is left unset in
          #    main.tf (null-preservation), so this must be a clean plan.
          tofu import slurm_account.root_protected root
          output=$(tofu plan -no-color 2>&1)
          echo "$output"
          if ! echo "$output" | grep -qF "No changes."; then
            echo "FAIL: expected a clean plan after import, found a diff"
            exit 1
          fi

          # 2. Outright destroy: `tofu plan -destroy` simulates what `tofu
          #    destroy` would plan, without editing config or touching the
          #    cluster -- plan is always read-only.
          set +e
          output=$(tofu plan -destroy -no-color 2>&1)
          exit_code=$?
          set -e
          echo "$output"
          if [ "$exit_code" -eq 0 ]; then
            echo "FAIL: expected the destroy plan to fail, got exit 0"
            exit 1
          fi
          if ! echo "$output" | grep -qF 'Refusing to delete protected account "root"'; then
            echo "FAIL: expected the protected-account error, did not find it"
            exit 1
          fi

          # 3. Rename-triggered replace: `name` has RequiresReplace(), so
          #    changing it plans a destroy of the old ("root") instance plus
          #    a create of a new one -- just as much a deletion of the
          #    protected account as step 2, even though the planned value
          #    isn't null this time.
          sed -i 's/name = "root"/name = "root_renamed"/' main.tf
          set +e
          output=$(tofu plan -no-color 2>&1)
          exit_code=$?
          set -e
          git checkout -- main.tf
          echo "$output"
          if [ "$exit_code" -eq 0 ]; then
            echo "FAIL: expected the rename-triggered replace plan to fail, got exit 0"
            exit 1
          fi
          if ! echo "$output" | grep -qF 'Refusing to delete protected account "root"'; then
            echo "FAIL: expected the protected-account error on rename, did not find it"
            exit 1
          fi

          echo "PASS: root account deletion is blocked at plan time (destroy and rename)"

      - name: Run QOS acceptance tests (all attributes + import verification)
        env:
          TF_CLI_CONFIG_FILE: /tmp/dev.tofurc
          TF_VAR_slurm_token: ${{ env.SLURM_JWT_TOKEN }}
          TF_VAR_slurm_api_version: ${{ matrix.api_version }}
        run: |
          cd test/fixtures/qos-acceptance-tests/

          # --- Cycle 1: create, verify idempotency, destroy ---
          tofu apply -auto-approve
          tofu plan -detailed-exitcode
          tofu destroy -auto-approve

          # --- Cycle 2: create, then verify import ---
          tofu apply -auto-approve
          tofu plan -detailed-exitcode

          # Remove every QOS resource from state to simulate a fresh import.
          RESOURCES="
            slurm_qos.qtest_minimal
            slurm_qos.qtest_wall
            slurm_qos.qtest_preempt
            slurm_qos.qtest_tres_job
            slurm_qos.qtest_tres_grp
            slurm_qos.qtest_tres_user
            slurm_qos.qtest_tres_acct
            slurm_qos.qtest_jobs
            slurm_qos.qtest_misc
            slurm_qos.qtest_tres_mins_job
          "
          for res in $RESOURCES; do
            tofu state rm "$res"
          done

          # Re-import each QOS by name (resource_address = Slurm QOS name).
          tofu import slurm_qos.qtest_minimal      qtest_minimal
          tofu import slurm_qos.qtest_wall         qtest_wall
          tofu import slurm_qos.qtest_preempt      qtest_preempt
          tofu import slurm_qos.qtest_tres_job     qtest_tres_job
          tofu import slurm_qos.qtest_tres_grp     qtest_tres_grp
          tofu import slurm_qos.qtest_tres_user    qtest_tres_user
          tofu import slurm_qos.qtest_tres_acct    qtest_tres_acct
          tofu import slurm_qos.qtest_jobs         qtest_jobs
          tofu import slurm_qos.qtest_misc         qtest_misc
          tofu import slurm_qos.qtest_tres_mins_job qtest_tres_mins_job

          # After import, plan must show no changes.
          # A non-zero exit here means the imported state diverges from config
          # — a drift bug in Read or modelToAPI.
          tofu plan -detailed-exitcode

          tofu destroy -auto-approve

      - name: Run association limits acceptance tests (all new fields + import)
        env:
          TF_CLI_CONFIG_FILE: /tmp/dev.tofurc
          TF_VAR_slurm_token: ${{ env.SLURM_JWT_TOKEN }}
          TF_VAR_slurm_api_version: ${{ matrix.api_version }}
        run: |
          cd test/fixtures/assoc-limits-tests/

          # --- Cycle 1: create, verify idempotency, destroy ---
          tofu apply -auto-approve
          tofu plan -detailed-exitcode
          tofu destroy -auto-approve

          # --- Cycle 2: create, then verify import ---
          tofu apply -auto-approve
          tofu plan -detailed-exitcode

          # Remove every user resource from state to simulate a fresh import.
          USERS="
            slurm_user.uat_minimal
            slurm_user.uat_job_counts
            slurm_user.uat_wall
            slurm_user.uat_max_tres
            slurm_user.uat_grp_tres
            slurm_user.uat_priority
            slurm_user.uat_fairshare_priority
            slurm_user.uat_all_limits
            slurm_user.uat_multi_assoc
          "
          for res in $USERS; do
            tofu state rm "$res"
          done

          # Re-import each user by name.
          tofu import slurm_user.uat_minimal          uat_minimal
          tofu import slurm_user.uat_job_counts       uat_job_counts
          tofu import slurm_user.uat_wall             uat_wall
          tofu import slurm_user.uat_max_tres         uat_max_tres
          tofu import slurm_user.uat_grp_tres         uat_grp_tres
          tofu import slurm_user.uat_priority         uat_priority
          tofu import slurm_user.uat_fairshare_priority uat_fs_prio
          tofu import slurm_user.uat_all_limits       uat_all_lim
          tofu import slurm_user.uat_multi_assoc      uat_multi

          # Reconciliation apply: inherited QOS values (returned by the API
          # but not declared in config) are normalised here. After this apply
          # the state must exactly match the config.
          tofu apply -auto-approve
          tofu plan -detailed-exitcode

          tofu destroy -auto-approve

      - name: Run big-cluster example acceptance test
        env:
          TF_CLI_CONFIG_FILE: /tmp/dev.tofurc
          TF_VAR_slurm_token: ${{ env.SLURM_JWT_TOKEN }}
          TF_VAR_slurm_api_version: ${{ matrix.api_version }}
        run: |
          cd examples/big-cluster/

          # This is the account-centric, data-driven layout for large
          # clusters: data/accounts/*.yaml + data/users/*.yaml, inverted by
          # generate.tf into slurm_account/slurm_user resources. Exercises
          # every account-level and per-member override field the README
          # documents (allowed_qos, TRES limits at both scopes, job-count and
          # wall-clock limits, partition scoping on a non-default account,
          # default_wc_key wiring, admin_level) plus the two documented
          # workarounds for real Slurm/provider interactions found while
          # verifying this example (restating every TRES type on a partial
          # per-member override; never scoping a user's default-account
          # association to a partition).
          tofu apply -auto-approve
          tofu plan -detailed-exitcode
          tofu destroy -auto-approve

      - name: Run generate_import.py acceptance test (flat + big-cluster layouts)
        env:
          TF_CLI_CONFIG_FILE: /tmp/dev.tofurc
          TF_VAR_slurm_token: ${{ env.SLURM_JWT_TOKEN }}
          TF_VAR_slurm_api_version: ${{ matrix.api_version }}
        run: |
          # Populate the cluster using the big-cluster example (rich,
          # multi-field, multi-account, multi-association fixture data) so
          # the importer has a realistic and comprehensive cluster to read
          # back. generate_import.py itself only issues GET requests, so
          # running it twice (once per --layout) against this same live
          # population is safe.
          cd examples/big-cluster/
          tofu apply -auto-approve
          cd ../..

          rm -rf /tmp/gen-flat /tmp/gen-bigcluster

          echo "--- Exporting --layout flat ---"
          python3 tools/generate_import/generate_import.py \
            --endpoint http://localhost:6820 \
            --token "$SLURM_JWT_TOKEN" \
            --cluster linux \
            --api-version "${{ matrix.api_version }}" \
            --output-dir /tmp/gen-flat \
            --layout flat
          test -f /tmp/gen-flat/provider.tf
          test -f /tmp/gen-flat/qos.tf
          test -f /tmp/gen-flat/accounts.tf
          test -f /tmp/gen-flat/users.tf
          test -f /tmp/gen-flat/imports.tf

          echo "--- Exporting --layout big-cluster ---"
          python3 tools/generate_import/generate_import.py \
            --endpoint http://localhost:6820 \
            --token "$SLURM_JWT_TOKEN" \
            --cluster linux \
            --api-version "${{ matrix.api_version }}" \
            --output-dir /tmp/gen-bigcluster \
            --layout big-cluster
          test -f /tmp/gen-bigcluster/main.tf
          test -f /tmp/gen-bigcluster/qos.tf
          test -f /tmp/gen-bigcluster/generate.tf
          test -f /tmp/gen-bigcluster/data/users/admin_level.yaml
          test -f /tmp/gen-bigcluster/data/users/default_accounts.yaml
          test -f /tmp/gen-bigcluster/data/users/wckeys.yaml
          test -n "$(ls /tmp/gen-bigcluster/data/accounts/*.yaml 2>/dev/null)"

          echo "--- Verifying --layout flat: import -> reconcile -> clean plan ---"
          cd /tmp/gen-flat
          tofu init
          tofu apply -auto-approve
          tofu apply -auto-approve
          tofu plan -detailed-exitcode

          echo "--- Verifying --layout big-cluster: import -> reconcile -> clean plan ---"
          cd /tmp/gen-bigcluster
          tofu init
          tofu apply -auto-approve
          tofu apply -auto-approve
          tofu plan -detailed-exitcode

          # Tear down the live Slurm state via either generated config — both
          # reference the same underlying accounts/users/QOS imported from the
          # same live cluster.
          tofu destroy -auto-approve

      - name: Collect Docker logs on failure
        if: failure()
        run: |
          for svc in mysql slurmdbd slurmctld slurmrestd; do
            echo "=== $svc ==="
            docker logs "$svc" 2>&1 | tail -50 || true
          done
