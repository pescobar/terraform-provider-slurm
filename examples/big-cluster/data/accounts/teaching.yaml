description: "Teaching and courses"
organization: education
fairshare: 50
default_qos: short
allowed_qos: [short, standard, interactive]
max_jobs: 100
max_tres_per_node:
  - type: cpu
    count: 8
grp_tres:
  - type: cpu
    count: 200
# Account-wide association defaults: every member inherits these unless its own
# entry overrides the field. Declared ONCE here instead of repeated on every
# member -- the payoff grows with headcount: the six students below are bare
# names, yet all draw on the account's own fairshare weight (`parent`) rather
# than each carrying their own. On a real teaching account with hundreds of
# students this replaces hundreds of identical `fairshare: parent` lines with
# this single block. A member can still override any field (the TA, dave, sets
# his own `fairshare: 15` below).
association_defaults:
  account_overrides:
    fairshare: parent
user_associations:
  # TA slot: tighter, TA-appropriate limits.
  # (No `partition:` here on purpose — teaching is dave's only/default
  # account, and scoping a user's DEFAULT-account association to a
  # partition collides with the atomic user-create bootstrap call, which
  # always creates an unscoped association for that account first. See the
  # `partition` caveat in the Notes section below; `shared.yaml` (john, a
  # multi-account user) demonstrates `partition` safely on a non-default
  # account instead.
  - user: dave
    account_overrides:
      fairshare: 15   # overrides the account-wide `parent` default above
    association:
      priority: 20
      max_wall_pj: 240
      grp_wall: 2000
  # Students: bare names, no per-user config at all. Each one still gets
  # fairshare: parent from association_defaults above -- that's the whole point,
  # no `fairshare: parent` repeated on any of them.
  - carol
  - john
  - erin
  - frank
  - grace
  - heidi
  - ivan
