description: "Biology Lab"
organization: biology
fairshare: 100
default_qos: standard
allowed_qos: [standard, long, gpu]
max_tres_mins_per_job:
  - type: cpu
    count: 20000
grp_tres_mins:
  - type: cpu
    count: 400000
grp_tres_run_mins:
  - type: cpu
    count: 100000
members:
  # Postdoc: job-count throttled during a busy semester, plus a tighter
  # per-user TRES cap than the lab's own account-level limits above.
  - user: bob
    max_jobs: 5
    max_jobs_accrue: 10
    max_submit_jobs: 30
    grp_jobs: 15
    grp_jobs_accrue: 8
    grp_submit_jobs: 25
    max_tres_per_node:
      - type: cpu
        count: 4
    # max_tres_mins_per_job / grp_tres_mins / grp_tres_run_mins below only
    # restate "cpu" because that's the only type the account itself sets on
    # these same fields (above). Slurm merges TRES-list fields PER TYPE on
    # read, not as a whole list — if the account ever gains another type
    # here (e.g. gres/gpu) and bob's override doesn't restate it too, the
    # read-back becomes a merged {cpu: bob's, gpu: inherited} set that never
    # matches this config. See "TRES-list fields ... merge per-TRES-type on
    # read" under Notes in README.md, and lab_physics.yaml for a worked
    # example of restating a second type.
    max_tres_mins_per_job:
      - type: cpu
        count: 500
    grp_tres:
      - type: cpu
        count: 50
    grp_tres_mins:
      - type: cpu
        count: 5000
    grp_tres_run_mins:
      - type: cpu
        count: 2000
  - john
