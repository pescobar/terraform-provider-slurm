# Slurm test cluster — control plane only (no compute nodes).
# Pull pre-built images from GHCR:
#   docker compose pull && docker compose up -d
# Or build locally:
#   docker compose build && docker compose up -d
#
# Required env vars (or set in .env):
#   SLURM_VERSION   — e.g. 25.11.4  (tag of the GHCR image to pull/build)
#
# Optional env vars:
#   MYSQL_DATABASE  — default: slurm_acct_db
#   MYSQL_USER      — default: slurm
#   MYSQL_PASSWORD  — default: password

services:
  mysql:
    image: mariadb:12
    hostname: mysql
    container_name: mysql
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-slurm_acct_db}
      MYSQL_USER: ${MYSQL_USER:-slurm}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
    volumes:
      - var_lib_mysql:/var/lib/mysql
    networks:
      - slurm-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  slurmdbd:
    image: ghcr.io/pescobar/slurm-test:${SLURM_VERSION:?SLURM_VERSION is required}
    build:
      context: .
      args:
        SLURM_VERSION: ${SLURM_VERSION:?SLURM_VERSION is required}
    command: ["slurmdbd"]
    container_name: slurmdbd
    hostname: slurmdbd
    environment:
      MYSQL_USER: ${MYSQL_USER:-slurm}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
    volumes:
      - etc_munge:/etc/munge
      - etc_slurm:/etc/slurm
      - var_log_slurm:/var/log/slurm
    expose:
      - "6819"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - slurm-network
    healthcheck:
      test: ["CMD-SHELL", "pidof slurmdbd"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  slurmctld:
    image: ghcr.io/pescobar/slurm-test:${SLURM_VERSION:?SLURM_VERSION is required}
    command: ["slurmctld"]
    container_name: slurmctld
    hostname: slurmctld
    volumes:
      - etc_munge:/etc/munge
      - etc_slurm:/etc/slurm
      - var_log_slurm:/var/log/slurm
    expose:
      - "6817"
    depends_on:
      slurmdbd:
        condition: service_healthy
    networks:
      - slurm-network
    healthcheck:
      test: ["CMD-SHELL", "scontrol ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  slurmrestd:
    image: ghcr.io/pescobar/slurm-test:${SLURM_VERSION:?SLURM_VERSION is required}
    command: ["slurmrestd"]
    container_name: slurmrestd
    hostname: slurmrestd
    privileged: true
    volumes:
      - etc_munge:/etc/munge
      - etc_slurm:/etc/slurm
      - var_log_slurm:/var/log/slurm
    ports:
      - "6820:6820"
    depends_on:
      slurmctld:
        condition: service_healthy
    networks:
      - slurm-network
    healthcheck:
      test: ["CMD-SHELL", "test -S /var/run/slurmrestd/slurmrestd.socket"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  etc_munge:
  etc_slurm:
  var_lib_mysql:
  var_log_slurm:

networks:
  slurm-network:
    driver: bridge
