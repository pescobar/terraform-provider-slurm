# slurm.conf for Slurm 25.05.x
# Adapted from https://github.com/giovtorres/slurm-docker-cluster
# GPU support and compute nodes removed — control plane only for REST API testing.

ClusterName=linux
SlurmctldHost=slurmctld

ProctrackType=proctrack/linuxproc
ReturnToService=1
SlurmdParameters=config_overrides
MaxNodeCount=100

SlurmctldPidFile=/var/run/slurm/slurmctld.pid
SlurmctldPort=6817
SlurmdPidFile=/var/run/slurm/slurmd.pid
SlurmdPort=6818
SlurmdSpoolDir=/var/spool/slurm
SlurmUser=slurm
StateSaveLocation=/var/lib/slurm
TaskPlugin=task/affinity

# Timers
InactiveLimit=0
KillWait=30
MinJobAge=300
SlurmctldTimeout=120
SlurmdTimeout=300
Waittime=0

# Scheduling
SchedulerType=sched/backfill
SelectType=select/cons_tres

# GRES
GresTypes=gpu

# Logging and accounting
AccountingStorageHost=slurmdbd
AccountingStorageType=accounting_storage/slurmdbd
AccountingStorageTRES=cpu,mem,node,billing,gres/gpu
JobCompLoc=/var/log/slurm/jobcomp.log
JobCompType=jobcomp/filetxt
JobAcctGatherFrequency=30
SlurmctldDebug=info
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdDebug=info
SlurmdLogFile=/var/log/slurm/slurmd.log

# Authentication
AuthType=auth/munge
AuthAltTypes=auth/jwt
AuthAltParameters=jwt_key=/etc/slurm/jwt_hs256.key

# Minimal partition (no static nodes; dynamic registration via slurmd -Z if needed)
PartitionName=cpu Default=YES MaxTime=INFINITE State=UP
