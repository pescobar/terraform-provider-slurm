# slurmdbd.conf — shared across all Slurm versions
# Adapted from https://github.com/giovtorres/slurm-docker-cluster
# MYSQL_USER and MYSQL_PASSWORD are substituted at container startup via envsubst.

AuthType=auth/munge
AuthAltTypes=auth/jwt
AuthAltParameters=jwt_key=/etc/slurm/jwt_hs256.key

DbdAddr=slurmdbd
DbdHost=slurmdbd

SlurmUser=slurm
DebugLevel=4
LogFile=/var/log/slurm/slurmdbd.log
PidFile=/var/run/slurm/slurmdbd.pid

StorageType=accounting_storage/mysql
StorageHost=mysql
StorageUser=${MYSQL_USER}
StoragePass=${MYSQL_PASSWORD}
StorageLoc=slurm_acct_db
